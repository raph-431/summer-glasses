<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>summer glasses — contact sheet</title>
<!-- Dev tool only: renders a population of seeds as a grid so distribution
     questions (too dark? too centred? bad pairing?) are judged across many
     deals at once instead of one reroll at a time. Never part of the minted
     build. Each cell runs the real piece in an iframe (3 at a time — each
     is a WebGL context), asks it to photograph itself once the long
     exposure has charged (the {after} field of the snapshot request), then
     swaps the live iframe for the JPEG. -->
<style>
  :root { color-scheme: dark; }
  body { margin: 0; background: #0a0a0c; color: #cfcfd6;
         font: 13px/1.4 ui-monospace, Menlo, monospace; }
  header { display: flex; align-items: baseline; gap: 14px;
           padding: 12px 16px; position: sticky; top: 0;
           background: #0a0a0cee; z-index: 2; }
  h1 { font-size: 14px; font-weight: 600; margin: 0; letter-spacing: 0.04em; }
  button { background: #1c1c22; color: #cfcfd6; border: 1px solid #33333c;
           border-radius: 4px; padding: 4px 12px; font: inherit; cursor: pointer; }
  button:hover { background: #26262e; }
  #st { color: #8a8a94; }
  #grid { display: grid; gap: 10px; padding: 0 16px 24px;
          grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); }
  .cell { display: flex; flex-direction: column; gap: 4px; }
  .view { position: relative; aspect-ratio: 8/5; background: #000;
          border-radius: 3px; overflow: hidden; }
  .view iframe, .view img { position: absolute; inset: 0;
          width: 100%; height: 100%; border: 0; display: block;
          object-fit: cover; }
  .shield { position: absolute; inset: 0; }  /* keep drags off the iframe */
  .cell a { color: #8a8a94; text-decoration: none; }
  .cell a:hover { color: #e6e6ee; }
  .pending { opacity: 0.45; }
</style>
</head>
<body>
<header>
  <h1>contact sheet</h1>
  <button id="re">reroll all</button>
  <span id="st"></span>
  <span style="color:#55555e">?n=count &amp; ?after=frames — click a seed to open it live</span>
</header>
<div id="grid"></div>
<script>
'use strict';
const params = new URLSearchParams(location.search);
const N     = Math.min(Math.max(+(params.get('n') || 24), 1), 96);
// frames of exposure before the snapshot: ~300 ≈ 60% charged, uniform
// across cells (what matters here is comparability, not final brightness)
const AFTER = Math.min(Math.max(+(params.get('after') || 300), 20), 2000);
const CONC  = 3;              // live WebGL contexts at once (browser cap ~16)

const $ = id => document.getElementById(id);
const grid = $('grid'), st = $('st');
let cells = [], queue = [], active = 0, done = 0;

const rndSeed = () => Array.from(crypto.getRandomValues(new Uint8Array(4)),
                                 b => b.toString(16).padStart(2, '0')).join('');

function build(){
  grid.innerHTML = '';
  cells = []; queue = []; active = 0; done = 0;
  for(let i = 0; i < N; i++){
    const seed = rndSeed();
    const cell = document.createElement('div');
    cell.className = 'cell';
    const view = document.createElement('div');
    view.className = 'view pending';
    const cap = document.createElement('a');
    cap.textContent = seed;
    cap.href = 'index.html#seed=' + seed;
    cap.target = '_blank';
    cell.append(view, cap);
    grid.append(cell);
    const c = { seed, view, idx: i, frame: null };
    cells.push(c);
    queue.push(c);
  }
  pump();
}

function pump(){
  while(active < CONC && queue.length){
    const c = queue.shift();
    active++;
    const f = document.createElement('iframe');
    f.src = 'index.html#seed=' + c.seed;
    const shield = document.createElement('div');
    shield.className = 'shield';
    c.view.classList.remove('pending');
    c.view.append(f, shield);
    c.frame = f;
    f.addEventListener('load', () => {
      // ask the piece to photograph itself once the exposure has charged
      setTimeout(() => f.contentWindow.postMessage(
        { type: 'summer-glass-snapshot-request', id: c.idx,
          quality: 0.85, after: AFTER }, '*'), 50);
    });
  }
  st.textContent = done + '/' + N;
}

addEventListener('message', e => {
  const d = e.data;
  if(!d || d.type !== 'summer-glass-snapshot') return;
  const c = cells[d.id];
  if(!c || !c.frame) return;
  c.view.innerHTML = '';
  if(d.jpeg){
    const img = new Image();
    img.src = d.jpeg;
    img.alt = c.seed;
    c.view.append(img);
  } else {
    c.view.textContent = d.error || 'snapshot failed';
  }
  c.frame = null;
  active--;
  done++;
  pump();
});

$('re').addEventListener('click', build);
build();
</script>
</body>
</html>
