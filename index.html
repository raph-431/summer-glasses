<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Faceted Glass — Simulated Caustics</title>
<style>
  html, body { margin:0; height:100%; overflow:hidden; background:#b9b6b3; }
  canvas { position:fixed; inset:0; width:100%; height:100%; display:block; cursor:grab; touch-action:none; }
  #ui {
    position:fixed; left:16px; bottom:16px; z-index:2;
    max-height:calc(100vh - 32px); overflow-y:auto;
    font:12px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color:#3a3733; background:rgba(255,255,255,.55); backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    padding:12px 16px; border-radius:12px; border:1px solid rgba(255,255,255,.6);
    box-shadow:0 4px 24px rgba(60,50,40,.18); user-select:none;
  }
  #ui h1 { margin:0 0 2px; font-size:13px; font-weight:600; }
  #ui .hint { opacity:.65; margin-bottom:8px; }
  #ui label { display:flex; align-items:center; gap:8px; margin-top:4px; }
  #ui label span { width:80px; opacity:.8; }
  #ui input[type=range] { width:120px; accent-color:#a5763a; }
  #ui input[type=color] { width:36px; height:20px; border:none; background:none; padding:0; cursor:pointer; }
  #ui select {
    font:11px inherit; color:#3a3733; background:rgba(255,255,255,.7);
    border:1px solid rgba(120,90,50,.3); border-radius:6px; padding:2px 4px;
  }
  #corner {
    position:fixed; right:26px; bottom:22px; z-index:2;
    display:flex; gap:20px; align-items:baseline;
  }
  #corner button {
    padding:0; border:none; background:none; cursor:pointer;
    font:14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color:rgba(255,255,255,.65);
    text-shadow:0 1px 8px rgba(20,15,10,.5);
    user-select:none;
  }
  #corner button:hover { color:rgba(255,255,255,.9); }
  #audioBtn.on, #orbitBtn.on { color:rgba(255,235,200,.95); }
  #infoPanel {
    position:fixed; right:22px; bottom:52px; z-index:2; display:none;
    font:13px/1.7 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color:#3a3733; background:rgba(255,255,255,.55);
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    padding:10px 16px; border-radius:12px; border:1px solid rgba(255,255,255,.6);
    box-shadow:0 4px 24px rgba(60,50,40,.18); user-select:none;
  }
  #infoPanel span { display:inline-block; width:78px; opacity:.55; }
  #ui .grp { margin-top:8px; padding-top:5px; border-top:1px solid rgba(120,90,50,.18); }
  #ui .grp h2 {
    margin:0 0 2px; font-size:10px; font-weight:600; opacity:.5;
    text-transform:uppercase; letter-spacing:.07em;
  }
  #err { position:fixed; inset:0; display:none; place-items:center; color:#333; font:14px sans-serif; }
  #legend {
    display:none; /* haiku parked for now — delete this line to bring it back */
    position:fixed; left:50%; bottom:8%; transform:translateX(-50%);
    z-index:2; max-width:72vw; text-align:center; white-space:pre-line;
    font:italic 17px/1.7 Georgia, "Times New Roman", serif;
    color:rgba(255,255,255,.93);
    text-shadow:0 1px 10px rgba(20,15,10,.55), 0 0 2px rgba(20,15,10,.35);
    opacity:0; transition:opacity 1.8s ease; pointer-events:none; user-select:none;
  }
  #legend.show { opacity:1; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="err">This demo needs WebGL2 with float render targets.</div>
<div id="legend"></div>
<div id="corner">
  <button id="orbitBtn" title="slowly circle the glass">auto-orbit</button>
  <button id="shotBtn" title="save this frame as a picture">download</button>
  <button id="infoBtn">info</button>
  <button id="audioBtn">sound on/off</button>
</div>
<div id="infoPanel"></div>
<div id="ui" style="display:none">
  <h1>Simulated caustics — summer in a glass</h1>
  <div class="hint">photons traced through the glass each frame<br>drag to orbit · H shows the haiku · S (or 'download') saves a PNG</div>
  <div class="grp"><h2>glass</h2>
    <label><span>glass shape</span><select id="shape">
      <option value="highball" selected>highball</option>
      <option value="rocks">rocks</option>
      <option value="shot">shot</option>
      <option value="barrel">barrel</option>
      <option value="flared">flared</option>
      <option value="wine">wine</option>
      <option value="martini">martini</option>
      <option value="flute">flute</option>
      <option value="goblet">goblet</option>
      <option value="fishbowl">fishbowl</option>
      <option value="alembic">alembic</option>
      <option value="bottle">wine bottle</option>
    </select></label>
    <label><span>glass depth</span><input id="wall" type="range" min="0.008" max="0.220" step="0.001" value="0.045"></label>
    <label><span>glass tint</span><input id="glassCol" type="color" value="#eefbf1"></label>
    <label><span>irregularity</span><input id="irr" type="range" min="0" max="1.5" step="0.01" value="1"></label>
    <label><span>glass bubbles</span><input id="bub" type="range" min="0" max="1" step="0.01" value="0"></label>
    <label><span>bubble size</span><input id="bubSz" type="range" min="0.5" max="2.5" step="0.01" value="1"></label>
    <label><span>gold rim</span><input id="rim" type="checkbox"></label>
  </div>
  <div class="grp"><h2>pattern</h2>
    <label><span>pattern</span><select id="pat">
      <option value="1" selected>diamond</option>
      <option value="0">smooth</option>
      <option value="2">ribs</option>
      <option value="3">spiral</option>
      <option value="4">hobnail</option>
      <option value="5">pearl bands</option>
      <option value="6">pinstripes</option>
      <option value="7">flat panels</option>
      <option value="8">base star</option>
    </select></label>
    <label><span>facet depth</span><input id="facet" type="range" min="0" max="2.6" step="0.01" value="1"></label>
    <label><span>pattern aspect</span><input id="diam" type="range" min="0.25" max="3.2" step="0.01" value="1" title="tall vs wide / twist"></label>
    <label><span>pattern count</span><input id="diamN" type="range" min="4" max="48" step="1" value="16"></label>
    <label><span>dispersion</span><input id="disp" type="range" min="0" max="2" step="0.01" value="0.5"></label>
  </div>
  <div class="grp"><h2>liquid</h2>
    <label><span>liquid</span><select id="liquid">
      <option value="soda" selected>soda</option>
      <option value="oj">orange juice</option>
      <option value="water">water</option>
      <option value="sparkling">sparkling</option>
      <option value="whiteWine">white wine</option>
      <option value="redWine">red wine</option>
      <option value="rose">rosé</option>
      <option value="whiskey">whiskey</option>
      <option value="chartreuse">chartreuse</option>
      <option value="blueLagoon">blue lagoon</option>
      <option value="icedTea">iced tea</option>
      <option value="champagne">champagne</option>
      <option value="spritz">spritz</option>
      <option value="pastis">pastis</option>
      <option value="appleJuice">apple juice</option>
      <option value="shirleyTemple">shirley temple</option>
      <option value="lemonade">lemonade</option>
      <option value="gin">gin</option>
      <option value="ginFizz">gin fizz</option>
      <option value="empty">empty</option>
    </select></label>
    <label><span>fill level</span><input id="liq" type="range" min="0.10" max="0.90" step="0.01" value="0.48"></label>
    <label><span>liquid color</span><input id="colaCol" type="color" value="#541c17"></label>
    <label><span>turbidity</span><input id="turb" type="range" min="0" max="1" step="0.01" value="0.04"></label>
    <label><span>fizz</span><input id="fizz" type="range" min="0" max="1.5" step="0.01" value="0.8"></label>
    <label><span>ice cubes</span><select id="ice">
      <option value="0" selected>0</option>
      <option value="1">1</option>
      <option value="2">2</option>
      <option value="3">3</option>
    </select></label>
    <label><span>condensation</span><input id="cond" type="range" min="0" max="1.5" step="0.01" value="1"></label>
  </div>
  <div class="grp"><h2>scene</h2>
    <label><span>time of day</span><select id="tod">
      <option value="goldenAfternoon" selected>afternoon</option>
      <option value="dawn">dawn</option>
      <option value="morning">morning</option>
      <option value="noon">noon</option>
      <option value="sunset">sunset</option>
      <option value="dusk">dusk</option>
      <option value="night">nighttime</option>
    </select></label>
    <label><span>canopy</span><select id="canopy">
      <option value="0" selected>broadleaf</option>
      <option value="1">fine leaf</option>
      <option value="2">palm</option>
      <option value="3">pergola</option>
      <option value="4">parasol</option>
    </select></label>
    <label><span>table</span><select id="table">
      <option value="0" selected>stone</option>
      <option value="1">dark wood</option>
      <option value="4">light wood</option>
      <option value="2">tiles</option>
      <option value="3">concrete</option>
    </select></label>
    <label><span>wind</span><input id="wind" type="range" min="0" max="1.25" step="0.01" value="1"></label>
    <label><span>leaf shade</span><input id="leaf" type="range" min="0" max="1" step="0.01" value="0.85"></label>
    <label><span>sunlight</span><input id="sun" type="range" min="0.4" max="2" step="0.01" value="0.85"></label>
  </div>
</div>

<script src="shaders.js"></script>
<script src="taste.js"></script>
<script src="main.js"></script>
<script src="haiku.js"></script> <!-- dev-only caption layer; excluded from the minted build -->
</body>
</html>
